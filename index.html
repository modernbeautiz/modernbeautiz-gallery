<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ModernBeautiz Gallery</title>
    <style>
        :root { --bg: #ffffff; --text: #000000; --card-bg: #f2f2f2; --accent: #0095f6; --search-bg: #efefef; }
        [data-theme="dark"] { --bg: #000000; --text: #ffffff; --card-bg: #121212; --search-bg: #262626; }

        body { margin: 0; font-family: -apple-system, sans-serif; background-color: var(--bg); color: var(--text); transition: 0.3s; }
        
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 20px; position: sticky; top: 0; background: var(--bg); 
            z-index: 1000; border-bottom: 1px solid var(--search-bg); 
        }
        header h2 { position: absolute; left: 50%; transform: translateX(-50%); margin: 0; cursor: pointer; font-size: 1.2rem; }

        .header-right {
            display: flex; align-items: center; gap: 15px; margin-left: auto; z-index: 2;
        }

        .search-container { position: relative; width: 160px; }
        .search-container i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #8e8e8e; pointer-events: none; font-size: 14px;}
        #search-input { 
            width: 100%; padding: 8px 10px 8px 30px; border-radius: 20px; 
            border: none; background: var(--search-bg); color: var(--text); 
            box-sizing: border-box; font-size: 14px; outline: none;
        }

        .container { padding: 0 15px 15px 15px; max-width: 500px; margin: auto; }
        .album-grid { display: flex; flex-direction: column; gap: 20px; margin-top: 15px; }
        
        .album-card { 
            background: var(--card-bg); border-radius: 8px; overflow: hidden; 
            cursor: pointer; border: 0.5px solid #333; transition: transform 0.2s;
        }
        .album-card:active { transform: scale(0.98); }
        .album-card img { width: 100%; display: block; object-fit: contain; background: #000; }
        .album-card p { padding: 12px; margin: 0; font-weight: 500; font-size: 16px; }

        #no-results { display: none; text-align: center; margin-top: 50px; opacity: 0.8; font-weight: 600; color: var(--accent); }

        .switch-box { position: relative; width: 50px; height: 26px; }
        .switch-box input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; display: flex; align-items: center; padding: 0 5px; }
        
        /* --- ADDED SUN/MOON SYMBOLS --- */
        .slider:after { content: '🌙'; font-size: 12px; margin-left: auto; transition: 0.4s; }
        input:checked + .slider:after { content: '☀️'; margin-left: 0; margin-right: auto; }

        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; z-index: 2; }
        input:checked + .slider { background-color: #444; }
        input:checked + .slider:before { transform: translateX(24px); }

        #reels-view { display: none; }
        .reel-item { margin-bottom: 20px; background: #000; }
        .reel-item img { width: 100%; display: block; max-height: 90vh; object-fit: contain; }
        .reel-actions { padding: 15px; display: flex; justify-content: center; background: var(--bg); }
        .download-link { text-decoration: none; background: var(--accent); color: white; padding: 10px 30px; border-radius: 25px; font-weight: 600; }
        .back-btn { background: none; border: none; color: var(--accent); font-size: 16px; font-weight: 600; cursor: pointer; padding: 15px 0; }

        #scrollTopBtn {
            display: none; position: fixed; bottom: 20px; right: 20px; z-index: 99; 
            font-size: 20px; border: none; outline: none; background-color: var(--accent); 
            color: white; cursor: pointer; width: 45px; height: 45px; border-radius: 50%; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: 0.3s; display: flex;
            align-items: center; justify-content: center; opacity: 0; pointer-events: none;
        }
        #scrollTopBtn.show { opacity: 1; pointer-events: auto; }
        #scrollTopBtn:active { transform: scale(0.9); }
    </style>
</head>
<body data-theme="dark">

<header>
    <h2 onclick="showHome()">ModernBeautiz</h2>
    
    <div class="header-right">
        <div class="search-container">
            <i>🔍</i>
            <input type="text" id="search-input" placeholder="Search..." oninput="filterAlbums()">
        </div>
        
        <label class="switch-box">
            <input type="checkbox" id="theme-toggle" onchange="toggleTheme()" checked>
            <span class="slider"></span>
        </label>
    </div>
</header>

<div class="container" id="home-view">
    <div id="no-results"></div>
    <div class="album-grid" id="album-list"></div>
</div>

<div class="container" id="reels-view">
    <button class="back-btn" onclick="showHome()">← Back to Gallery</button>
    <div id="reels-list"></div>
</div>

<button id="scrollTopBtn" onclick="scrollToTop()">↑</button>

<script>
    const albumData = {
        "Malvika Mohan": ["Malvika Mohan 1.jpg", "Malvika Mohan 2.png", "Malvika Mohan 3.webp"],
        "Raashi Khanna": ["Raashi Khanna 001.jpg", "Raashi Khanna 002.jpg","Raashi Khanna 003.jpg","Raashi Khanna 004.jpg"],
        "Rashmika Mandanna": ["Rashmika Mandanna 001.jpg","Rashmika Mandanna 002.jpg","Rashmika Mandanna 003.jpg"]
    };

    function init() {
        const list = document.getElementById('album-list');
        list.innerHTML = '';

        for (let actress in albumData) {
            const card = document.createElement('div');
            card.className = 'album-card';
            card.setAttribute('data-name', actress.toLowerCase());
            card.onclick = () => showAlbum(actress);
            
            const coverImg = albumData[actress][0];
            card.innerHTML = `
                <img src="${coverImg}" alt="${actress}">
                <p>${actress}</p>
            `;
            list.appendChild(card);
        }

        window.onpopstate = () => {
            if (document.getElementById('reels-view').style.display === 'block') showHome(true);
        };
    }

    function filterAlbums() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const cards = document.getElementsByClassName('album-card');
        const noResults = document.getElementById('no-results');
        let foundAny = false;

        for (let card of cards) {
            const name = card.getAttribute('data-name');
            if (name.includes(query)) {
                card.style.display = "block";
                foundAny = true;
            } else {
                card.style.display = "none";
            }
        }

        if (!foundAny) {
            noResults.innerHTML = `Sorry, "${query}" is not available in our gallery yet.`;
            noResults.style.display = "block";
        } else {
            noResults.style.display = "none";
        }
    }

    function showAlbum(name) {
        history.pushState({view: "album"}, ""); 
        document.getElementById('home-view').style.display = 'none';
        document.getElementById('reels-view').style.display = 'block';
        
        const list = document.getElementById('reels-list');
        list.innerHTML = '';
        
        albumData[name].forEach(imgSrc => {
            const item = document.createElement('div');
            item.className = 'reel-item';
            item.innerHTML = `
                <img src="${imgSrc}">
                <div class="reel-actions">
                    <a href="${imgSrc}" download class="download-link">Download Original HD</a>
                </div>
            `;
            list.appendChild(item);
        });
        window.scrollTo(0,0);
    }

    function showHome(isBackAction = false) {
        if (!isBackAction && history.state && history.state.view === "album") {
            history.back(); return;
        }
        document.getElementById('home-view').style.display = 'block';
        document.getElementById('reels-view').style.display = 'none';
        window.scrollTo(0,0);
    }

    function toggleTheme() {
        const body = document.body;
        const newTheme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        body.setAttribute('data-theme', newTheme);
    }

    window.onscroll = function() {
        const btn = document.getElementById("scrollTopBtn");
        if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
            btn.style.display = "flex";
            setTimeout(() => btn.classList.add("show"), 10);
        } else {
            btn.classList.remove("show");
            setTimeout(() => {
                if(!btn.classList.contains("show")) btn.style.display = "none";
            }, 300);
        }
    };

    function scrollToTop() {
        window.scrollTo({
            top: 0,
            behavior: 'smooth'
        });
    }

    init();
</script>
</body>
</html>
