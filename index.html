<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ModernBeautiz Gallery</title>
    <style>
        :root { --bg: #ffffff; --text: #000000; --card-bg: #f2f2f2; --accent: #0095f6; --search-bg: #efefef; }
        [data-theme="dark"] { --bg: #000000; --text: #ffffff; --card-bg: #121212; --search-bg: #262626; }

        body { margin: 0; font-family: -apple-system, sans-serif; background-color: var(--bg); color: var(--text); transition: 0.3s; }
        
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 20px; position: sticky; top: 0; background: var(--bg); 
            z-index: 1000; border-bottom: 1px solid var(--search-bg); 
        }
        header h2 { margin: 0; cursor: pointer; font-size: 1.3rem; }

        .header-right { display: flex; align-items: center; gap: 8px; }

        .search-container { position: relative; width: 120px; }
        .search-container i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #8e8e8e; pointer-events: none; font-size: 14px;}
        #search-input { 
            width: 100%; padding: 8px 10px 8px 30px; border-radius: 20px; 
            border: none; background: var(--search-bg); color: var(--text); 
            box-sizing: border-box; font-size: 14px; outline: none;
        }

        /* ACTION BUTTONS */
        .btn-action {
            background: var(--search-bg);
            border: none;
            color: var(--text);
            padding: 6px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: 0.2s;
            white-space: nowrap;
        }
        .btn-action:active { transform: scale(0.9); }
        .request-btn { background: #0084ff; color: white; }

        @media (max-width: 480px) {
            header { flex-direction: column; gap: 12px; padding: 15px; text-align: center; }
            .header-right { width: 100%; justify-content: center; flex-wrap: wrap; gap: 10px; }
            .search-container { width: 100%; order: -1; }
        }

        .container { padding: 0 15px 15px 15px; max-width: 500px; margin: auto; }
        .instruction { text-align: center; font-size: 0.9rem; margin: 15px 0 5px 0; opacity: 0.7; }

        .album-grid { display: flex; flex-direction: column; gap: 20px; margin-top: 10px; }
        .album-card { 
            background: var(--card-bg); border-radius: 12px; overflow: hidden; 
            cursor: pointer; border: 0.5px solid #333; transition: 0.2s;
        }
        .album-card img { width: 100%; display: block; object-fit: contain; background: #000; min-height: 200px; }
        .album-card p { padding: 12px; margin: 0; font-weight: 600; font-size: 16px; text-align: center; }

        #no-results { display: none; text-align: center; margin-top: 50px; font-weight: 500; line-height: 1.5; color: var(--accent); }

        .switch-box { position: relative; width: 45px; height: 24px; flex-shrink: 0; }
        .switch-box input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; display: flex; align-items: center; padding: 0 5px; }
        .slider:after { content: '🌙'; font-size: 11px; margin-left: auto; }
        input:checked + .slider:after { content: '☀️'; margin-right: auto; margin-left: 0; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; z-index: 2; }
        input:checked + .slider { background-color: #444; }
        input:checked + .slider:before { transform: translateX(21px); }

        #reels-view { display: none; }
        .reel-item { margin-bottom: 20px; background: #000; }
        .reel-item img { width: 100%; display: block; max-height: 90vh; object-fit: contain; }
        .reel-actions { padding: 15px; display: flex; justify-content: center; background: var(--bg); }
        .download-link { text-decoration: none; background: var(--accent); color: white; padding: 10px 30px; border-radius: 25px; font-weight: 600; }
        .back-btn { background: none; border: none; color: var(--accent); font-size: 16px; font-weight: 600; cursor: pointer; padding: 15px 0; }

        #scrollTopBtn {
            display: none; position: fixed; bottom: 20px; right: 20px; z-index: 99; 
            font-size: 20px; border: none; outline: none; background-color: var(--accent); 
            color: white; cursor: pointer; width: 45px; height: 45px; border-radius: 50%; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: 0.3s; display: flex;
            align-items: center; justify-content: center; opacity: 0; pointer-events: auto;
        }
        #scrollTopBtn.show { opacity: 1; }
    </style>
</head>
<body data-theme="dark">

<header>
    <h2 onclick="showHome()">ModernBeautiz</h2>
    <div class="header-right">
        <div class="search-container">
            <i>🔍</i>
            <input type="text" id="search-input" placeholder="Search..." oninput="filterAlbums()">
        </div>
        
        <button class="btn-action request-btn" onclick="requestActress()">💬 Request</button>
        <button class="btn-action" onclick="shareGallery()">🔗 Share</button>

        <label class="switch-box">
            <input type="checkbox" id="theme-toggle" onchange="toggleTheme()" checked>
            <span class="slider"></span>
        </label>
    </div>
</header>

<div class="container" id="home-view">
    <p class="instruction">✨ Click any album to view full images</p>
    <div id="no-results"></div>
    <div class="album-grid" id="album-list"></div>
</div>

<div class="container" id="reels-view">
    <button class="back-btn" onclick="showHome()">← Back to Gallery</button>
    <div id="reels-list"></div>
</div>

<button id="scrollTopBtn" onclick="scrollToTop()">↑</button>

<script>
    const albumData = {
        "Malvika Mohan": ["image1.jpg", "image2.jpg"],
        "Raashi Khanna": ["Raashi Khanna 001.jpg", "Raashi Khanna 002.jpg"],
        "Rashmika Mandanna": ["Rashmika Mandanna 001.jpg"]
    };

    function init() {
        const list = document.getElementById('album-list');
        list.innerHTML = '';
        for (let actress in albumData) {
            const card = document.createElement('div');
            card.className = 'album-card';
            card.setAttribute('data-name', actress.toLowerCase());
            card.onclick = () => showAlbum(actress);
            const coverImg = albumData[actress][0];
            card.innerHTML = `<img src="${coverImg}" alt="${actress}"><p>${actress}</p>`;
            list.appendChild(card);
        }
        window.onpopstate = () => { if (document.getElementById('reels-view').style.display === 'block') showHome(true); };
    }

    // --- REQUEST FUNCTION WITH YOUR PAGE LINK ---
    function requestActress() {
        // Your Page ID converted to Messenger link
        window.open(`https://m.me/61574366687042`, '_blank');
    }

    async function shareGallery() {
        const shareData = { title: 'ModernBeautiz', text: 'Check out this actress gallery!', url: window.location.href };
        if (navigator.share) { try { await navigator.share(shareData); } catch (err) {} } 
        else { navigator.clipboard.writeText(window.location.href); alert("Link Copied!"); }
    }

    function filterAlbums() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const cards = document.getElementsByClassName('album-card');
        const noResults = document.getElementById('no-results');
        const instruction = document.querySelector('.instruction');
        let foundAny = false;
        
        for (let card of cards) {
            const name = card.getAttribute('data-name');
            if (name.includes(query)) { card.style.display = "block"; foundAny = true; } 
            else { card.style.display = "none"; }
        }

        if (!foundAny) {
            noResults.innerHTML = `"${query}" is not available yet.<br>Click <b>Request</b> above to let us know!`;
            noResults.style.display = "block";
            instruction.style.display = "none";
        } else {
            noResults.style.display = "none";
            instruction.style.display = "block";
        }
    }

    function showAlbum(name) {
        history.pushState({view: "album"}, ""); 
        document.getElementById('home-view').style.display = 'none';
        document.getElementById('reels-view').style.display = 'block';
        const list = document.getElementById('reels-list');
        list.innerHTML = '';
        albumData[name].forEach(imgSrc => {
            const item = document.createElement('div');
            item.className = 'reel-item';
            item.innerHTML = `<img src="${imgSrc}"><div class="reel-actions"><a href="${imgSrc}" download class="download-link">Download HD</a></div>`;
            list.appendChild(item);
        });
        window.scrollTo(0,0);
    }

    function showHome(isBackAction = false) {
        if (!isBackAction && history.state && history.state.view === "album") { history.back(); return; }
        document.getElementById('home-view').style.display = 'block';
        document.getElementById('reels-view').style.display = 'none';
        window.scrollTo(0,0);
    }

    function toggleTheme() {
        const body = document.body;
        const newTheme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        body.setAttribute('data-theme', newTheme);
    }

    window.onscroll = function() {
        const btn = document.getElementById("scrollTopBtn");
        if (document.documentElement.scrollTop > 300) { btn.classList.add("show"); } 
        else { btn.classList.remove("show"); }
    };

    function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

    init();
</script>
</body>
</html>
