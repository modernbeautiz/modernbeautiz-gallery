<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ModernBeautiz Gallery</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --card-bg: #f8f8f8;
            --accent: #0095f6;
        }

        [data-theme="dark"] {
            --bg: #000000;
            --text: #ffffff;
            --card-bg: #121212;
        }

        body {
            margin: 0;
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: 0.3s;
        }

        /* HEADER & ELLIPSE TOGGLE */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 1000;
            border-bottom: 1px solid var(--card-bg);
        }

        .admin-dots { font-size: 28px; cursor: pointer; padding: 5px; }

        .switch-box { position: relative; width: 60px; height: 30px; }
        .switch-box input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .4s; border-radius: 34px;
            display: flex; align-items: center; justify-content: space-between; padding: 0 8px; font-size: 14px;
        }
        .slider:before {
            position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 4px;
            background-color: white; transition: .4s; border-radius: 50%; z-index: 2;
        }
        input:checked + .slider { background-color: #444; }
        input:checked + .slider:before { transform: translateX(30px); }

        /* ADMIN MENU */
        #admin-menu { 
            display: none; position: fixed; top: 60px; left: 10px; 
            background: var(--card-bg); border: 1px solid var(--accent); 
            padding: 15px; border-radius: 10px; z-index: 2000; width: 250px;
        }
        #admin-menu button { width: 100%; margin: 5px 0; padding: 10px; cursor: pointer; border-radius: 5px; border: none; background: #333; color: white; }

        /* VERTICAL ALBUM LIST (One per row) */
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .album-grid {
            display: flex;
            flex-direction: column; /* This makes it vertical */
            gap: 25px;
        }
        .album-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            text-align: center;
            border: 1px solid #333;
        }
        .album-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
        .album-card p { padding: 15px; margin: 0; font-weight: bold; font-size: 18px; }

        /* REELS VIEW */
        #reels-view { display: none; }
        .reel-item {
            margin-bottom: 40px;
            border-bottom: 1px solid var(--card-bg);
            padding-bottom: 20px;
        }
        .reel-item img { width: 100%; border-radius: 8px; display: block; }
        .reel-actions {
            padding: 12px 0;
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .action-btn { cursor: pointer; font-size: 24px; background: none; border: none; color: var(--text); }
        .download-link {
            text-decoration: none;
            background: var(--text);
            color: var(--bg);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .back-btn {
            background: none;
            border: 1px solid #333;
            color: var(--text);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
        }
    </style>
</head>
<body data-theme="dark">

<header>
    <div class="admin-dots" onclick="toggleAdmin()">⋮</div>
    <h2 onclick="showHome()" style="cursor:pointer; margin:0;">ModernBeautiz</h2>
    <label class="switch-box">
        <input type="checkbox" id="theme-toggle" onchange="toggleTheme()" checked>
        <span class="slider"><span>☀️</span><span>🌙</span></span>
    </label>
</header>

<div id="admin-menu">
    <h4 style="margin: 0 0 10px 0;">Admin Dashboard</h4>
    <button onclick="alert('Upload to GitHub & add to albumData in script.')">Add Album/Images</button>
</div>

<div class="container" id="home-view">
    <div class="album-grid" id="album-list"></div>
</div>

<div class="container" id="reels-view">
    <button class="back-btn" onclick="showHome()">← Back to Albums</button>
    <div id="reels-list"></div>
</div>

<script>
    // --- CONFIGURE YOUR ALBUMS HERE ---
    const albumData = {
        "Malvika Mohan": [
            "image1.jpg", 
            "image2.jpg"
        ],
        "Actress Two": [
            "20260304_013504.jpg"
        ]
    };

    function init() {
        const list = document.getElementById('album-list');
        list.innerHTML = '';
        for (let actress in albumData) {
            const card = document.createElement('div');
            card.className = 'album-card';
            card.onclick = () => showAlbum(actress);
            card.innerHTML = `
                <img src="${albumData[actress][0]}" alt="${actress}">
                <p>${actress}</p>
            `;
            list.appendChild(card);
        }

        // MOBILE BACK BUTTON FIX
        window.onpopstate = function(event) {
            if (document.getElementById('reels-view').style.display === 'block') {
                showHome(true); 
            }
        };
    }

    function showAlbum(name) {
        history.pushState({view: "album"}, ""); 
        document.getElementById('home-view').style.display = 'none';
        const reelsView = document.getElementById('reels-view');
        reelsView.style.display = 'block';
        
        const list = document.getElementById('reels-list');
        list.innerHTML = '';
        
        albumData[name].forEach(imgSrc => {
            const item = document.createElement('div');
            item.className = 'reel-item';
            item.innerHTML = `
                <img src="${imgSrc}">
                <div class="reel-actions">
                    <button class="action-btn" onclick="this.innerHTML = '❤️'">🤍</button>
                    <a href="${imgSrc}" download class="download-link">Download Original HD</a>
                </div>
            `;
            list.appendChild(item);
        });
        window.scrollTo(0,0);
    }

    function showHome(isBackAction = false) {
        if (!isBackAction && history.state && history.state.view === "album") {
            history.back();
            return;
        }
        document.getElementById('home-view').style.display = 'block';
        document.getElementById('reels-view').style.display = 'none';
        window.scrollTo(0,0);
    }

    function toggleTheme() {
        const body = document.body;
        const currentTheme = body.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        body.setAttribute('data-theme', newTheme);
    }

    function toggleAdmin() {
        const menu = document.getElementById('admin-menu');
        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    }

    init();
</script>
</body>
</html>
